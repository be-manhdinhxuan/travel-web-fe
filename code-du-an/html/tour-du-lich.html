<!DOCTYPE html>
<html lang="vi">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Du Lịch – VietnamTravel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="stylesheet" href="./css/bass.css">
    <link rel="stylesheet" href="./css/nav.css">
    <link rel="stylesheet" href="./css/home.css">
    <link rel="stylesheet" href="./css/nav.css">
    <link rel="stylesheet" href="./css/tours.css">
    <link rel="stylesheet" href="./css/components.css">
    <link rel="icon" href="./images/favicon/favicon.svg" type="image/svg+xml">
  </head>

  <body>
    <!-- ============ PAGE: TOUR LIST ============ -->
    <main id="page-tours">
      <div style="margin-top:82px;">
        <!-- Breadcrumb -->
        <div class="tl-breadcrumb">
          <a onclick="window.location.href='index.html'">Trang chủ</a> <span>›</span>
          <a id="tlBreadActive" href='tour-du-lich.html'>Tour du lịch</a>
        </div>

        <div class="tl-layout">
          <!-- SIDEBAR FILTER -->
          <aside class="tl-sidebar">

            <div class="tl-filter-box">
              <div class="tl-filter-title">
                <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
                  <path d="M3 5h14M6 10h8M9 15h2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                </svg>
                Tìm kiếm
              </div>
              <div class="tl-search-box">
                <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
                  <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.8" />
                  <path d="m16 16-3-3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                </svg>
                <input type="text" id="tlSearch" placeholder="Tìm kiếm tour..." oninput="handleSearch()">
              </div>
            </div>

            <div class="tl-filter-box">
              <div class="tl-filter-title">Khoảng giá/người</div>

              <div class="tl-filter-price">
                <label>
                  <input type="radio" name="price" value="" checked>
                  Tất cả
                </label>
                <label><input type="radio" name="price" value="0-1000000"> Dưới 1 triệu</label>
                <label><input type="radio" name="price" value="1000000-5000000"> 1 - 5 triệu</label>
                <label><input type="radio" name="price" value="5000000-10000000"> 5 - 10 triệu</label>
                <label><input type="radio" name="price" value="10000000-999999999"> Trên 10 triệu</label>

              </div>
            </div>

            <div class="tl-filter-box">
              <div class="tl-filter-title">Điểm đến</div>
              <div class="tl-search-box">
                <select id="tlProvinceDropdown"
                  style="width:100%;padding:7px 10px;border-radius:6px;border:1.2px solid #ddd;font-size:1rem">
                  <option value="">Tất cả tỉnh/thành</option>
                </select>
              </div>
            </div>

            <div class="tl-filter-box">
              <div class="tl-filter-title">khởi hành từ</div>
              <div class="tl-search-box" style="margin-bottom:10px;">
                <input type="date" id="tlStartDate" aria-label="Từ ngày khởi hành">
              </div>
              <div class="tl-filter-title">đến</div>
              <div class="tl-search-box">
                <input type="date" id="tlEndDate" aria-label="Đến ngày khởi hành">
              </div>
            </div>

            <button class="tl-apply-btn" onclick="handleFilter()">Áp dụng bộ lọc</button>

            <button class="tl-reset-btn" onclick="resetFilters()">Đặt lại bộ lọc</button>
          </aside>

          <!-- MAIN CONTENT -->
          <div class="tl-main">
            <div class="tl-top-bar">
              <div>
                <h1 class="tl-page-title">Khám phá vẻ đẹp Việt Nam</h1>
                <p class="tl-page-sub">Tìm thấy <strong id="tlCount">0</strong> tour du lịch</p>
              </div>
              <div class="tl-sort-wrap">
                <label style="font-size:0.78rem;color:var(--muted)">Sắp xếp:</label>
                <select id="tlSort" onchange="handleSort()" class="tl-sort-select">
                  <option value="newest">Mới nhất</option>
                  <option value="price_asc">Giá thấp → cao</option>
                  <option value="price_desc">Giá cao → thấp</option>
                  <option value="name_asc">Tên A → Z</option>
                  <option value="name_desc">Tên Z → A</option>
                  <option value="duration_asc">Thời gian ngắn → dài</option>
                  <option value="duration_desc">Thời gian dài → ngắn</option>
                </select>
              </div>
            </div>

            <div class="tours-grid" id="tourGrid"></div>

            <!-- Pagination -->
            <div class="tl-pagination" id="tlPagination"></div>
          </div>
        </div>
      </div>
    </main>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>


    <div data-shared-footer></div>


    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/nav.js"></script>
    <script src="./js/footer.js"></script>
    <script src="./js/toast.js"></script>
    <script src="./js/booking.js"></script>
    <script src="./js/favouites.js"></script>
    <script src="./js/tours-page.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {

        loadTours()
      })
    </script>
  </body>

</html>
